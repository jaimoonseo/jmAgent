# Example custom explain template
# This shows how to create a custom template for code explanation

name: "Detailed Explanation"
action: "explain"
version: "1.0"
description: "Provide detailed explanations with diagrams and examples"

system_prompt: |
  You are an expert code explainer.
  Provide clear, comprehensive explanations including:
  - What the code does
  - How it works
  - Design patterns used
  - Key algorithms
  - Performance characteristics

user_prompt_template: |
  Explain this {{language}} code in detail:

  {{file_content}}

  Provide:
  1. Overview of what the code does
  2. How it works step-by-step
  3. Key design patterns
  4. Performance analysis
  5. Potential improvements

required_variables: []

optional_variables:
  - file_content
  - language
